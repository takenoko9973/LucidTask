name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare_release_notes:
    name: Prepare Release Notes
    runs-on: ubuntu-22.04
    outputs:
      release_body: ${{ steps.release_notes.outputs.release_body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes from tag diff
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-creatordate | grep -vx "${current_tag}" | head -n 1 || true)"

          if [[ -n "${previous_tag}" ]]; then
            compare_range="${previous_tag}..${current_tag}"
            compare_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${previous_tag}...${current_tag}"
          else
            compare_range="${current_tag}"
            compare_url=""
          fi

          commits="$(git log --max-count=120 --pretty=format:'- %s (%h)' "${compare_range}" || true)"
          if [[ -z "${commits}" ]]; then
            commits="- 差分コミットなし"
          fi

          {
            echo "release_body<<EOF"
            echo "## 差分サマリ"
            echo
            if [[ -n "${compare_url}" ]]; then
              echo "- Compare: ${compare_url}"
              echo
            fi
            echo "## コミット"
            echo "${commits}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  publish:
    name: Publish (${{ matrix.platform }})
    needs: prepare_release_notes
    runs-on: ${{ matrix.platform }}
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-22.04
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LucidTask ${{ github.ref_name }}"
          releaseBody: ${{ needs.prepare_release_notes.outputs.release_body }}
          releaseDraft: false
          prerelease: false

      - name: Create portable ZIP (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $zipPath = "src-tauri/target/release/lucid-task-portable-${{ github.ref_name }}-windows-x64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "src-tauri/target/release/lucid-task.exe" -DestinationPath $zipPath

      - name: Create portable ZIP (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          zip -j "src-tauri/target/release/lucid-task-portable-${{ github.ref_name }}-linux-x64.zip" "src-tauri/target/release/lucid-task"

      - name: Create portable ZIP (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          zip -j "src-tauri/target/release/lucid-task-portable-${{ github.ref_name }}-macos-universal.zip" "src-tauri/target/release/lucid-task"

      - name: Upload portable ZIP to release (Windows)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          files: |
            src-tauri/target/release/lucid-task-portable-${{ github.ref_name }}-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload portable ZIP to release (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          files: |
            src-tauri/target/release/lucid-task-portable-${{ github.ref_name }}-linux-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload portable ZIP to release (macOS)
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          files: |
            src-tauri/target/release/lucid-task-portable-${{ github.ref_name }}-macos-universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
